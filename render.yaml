services:
  - type: web
    name: corpo-mente
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
